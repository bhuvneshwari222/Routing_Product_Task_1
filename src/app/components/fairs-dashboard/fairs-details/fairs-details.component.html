<mat-card class="p-0">
    <mat-card-content>
        <div class="fair">
            <figure class="banner" [ngStyle]="{
        'background-image': 'linear-gradient(0deg, #000 10%, transparent), url(' + fairObj.bannerUrl + ')'
    }">
                <figcaption>
                    <h1>{{fairObj.fairName}}</h1>
                    <div class="typeAndDate">
                        <p class="m-0">Event Type: {{fairObj.type}}</p>
                        <p class="m-0">Date: {{fairObj.startDate * 1000 | date}}</p>
                    </div>
                </figcaption>
            </figure>
            <div class="p-4">
                <p [innerHTML]="fairObj.candidateDescription"></p>
                <p [innerHTML]="fairObj.schoolDescription"></p>
            </div>
        </div>
    </mat-card-content>
</mat-card>
